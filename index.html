function getKeeperTier(name) {
  return PLAYER_META[name] || {
    age: null,
    dynRank: null,
    keeperTier: "B",
    prospect: false,
    dynNote: "No dynasty data"
  };
}

// Combined draft score: blends redraft rank with dynasty/age value
// For a perpetual keeper league, younger + higher dynRank = move up the board
function combinedScore(p) {
  const meta = getKeeperTier(p.name);
  const redraftScore = 300 - p.sgRank; // higher = better
  const age = meta.age || 30;
  // Age bonus: 22yo gets +40, 25yo gets +20, 30yo gets 0, 35yo gets -30
  const ageBonus = Math.max(-40, Math.min(50, (30 - age) * 4));
  const prospectBonus = meta.prospect ? 15 : 0;
  const tierBonus = {
    S: 25,
    A: 12,
    B: 0,
    C: -10,
    D: -30
  }[meta.keeperTier] || 0;
  return redraftScore + ageBonus + prospectBonus + tierBonus;
}

// ── Helpers ───────────────────────────────────────────────────────
function getMyPickSlots() {
  const picks = [];
  for (let r = KEEPER_ROUNDS + 1; r <= TOTAL_ROUNDS; r++) {
    const pick = r % 2 === 1 ? MY_SLOT : NUM_TEAMS - MY_SLOT + 1;
    picks.push({
      round: r,
      pickInRound: pick,
      overall: (r - 1) * NUM_TEAMS + pick
    });
  }
  return picks;
}
const MY_PICK_SLOTS = getMyPickSlots();
function getCatValue(player) {
  const v = {};
  HIT_CATS.forEach(cat => {
    if (player[cat] !== null && player[cat] !== undefined) {
      if (cat === "ba") v[cat] = (player[cat] - CAT_AVG[cat]) * 200;else v[cat] = player[cat] - CAT_AVG[cat];
    }
  });
  PIT_CATS.forEach(cat => {
    if (player[cat] !== null && player[cat] !== undefined) {
      if (LOWER_IS_BETTER.has(cat)) v[cat] = (CAT_AVG[cat] - player[cat]) * (cat === "era" ? 20 : 60);else v[cat] = player[cat] - CAT_AVG[cat];
    }
  });
  return v;
}
function rotoScore(player) {
  const v = getCatValue(player);
  return Object.values(v).reduce((s, x) => s + (x > 0 ? x : 0), 0);
}
function calcMyTotals(players) {
  const t = {
    hr: 0,
    r: 0,
    rbi: 0,
    sb: 0,
    ba: 0,
    era: 0,
    k: 0,
    w: 0,
    sv: 0,
    whip: 0
  };
  let batters = 0,
    pitchers = 0;
  players.forEach(p => {
    if (p.hr !== null && p.hr !== undefined) {
      t.hr += p.hr || 0;
      t.r += p.r || 0;
      t.rbi += p.rbi || 0;
      t.sb += p.sb || 0;
      t.ba += p.ba || 0;
      batters++;
    }
    if (p.era !== null && p.era !== undefined) {
      t.era += p.era || 0;
      t.k += p.k || 0;
      t.w += p.w || 0;
      t.sv += p.sv || 0;
      t.whip += p.whip || 0;
      pitchers++;
    }
  });
  if (batters > 0) t.ba = t.ba / batters;
  return {
    totals: t,
    batters,
    pitchers
  };
}
function getWeakCats(totals, batters, pitchers) {
  const weak = [];
  HIT_CATS.forEach(cat => {
    if (cat === "ba") {
      if ((totals.ba || 0) < CAT_AVG.ba) weak.push(cat);
    } else {
      if ((totals[cat] || 0) < CAT_AVG[cat] * Math.max(1, batters)) weak.push(cat);
    }
  });
  PIT_CATS.forEach(cat => {
    if (LOWER_IS_BETTER.has(cat)) {
      if ((totals[cat] || 999) > CAT_AVG[cat] || pitchers === 0) weak.push(cat);
    } else {
      if ((totals[cat] || 0) < CAT_AVG[cat] * Math.max(1, pitchers)) weak.push(cat);
    }
  });
  return weak;
}
